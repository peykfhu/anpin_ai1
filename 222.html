<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnPin AI - 智能大模型聚合网关</title>
    <style>
        :root { --bg: #fafafa; --text: #111827; --muted: #6b7280; --accent: #8b5cf6; --border: #e5e7eb; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 32px 32px; z-index: -1; opacity: 0.4; }
        .bg-glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; background: radial-gradient(circle, #eef2ff 0%, transparent 70%); z-index: -1; }
        
        /* 导航栏 */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
        .logo { font-size: 1.25rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .nav-center { display: flex; gap: 20px; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); padding: 8px 24px; border-radius: 40px; border: 1px solid var(--border); font-size: 0.9rem; }
        .nav-center a { text-decoration: none; color: var(--text); transition: 0.2s; }
        .nav-center a:hover { color: var(--accent); }
        .btn-console { background: #1f2937; color: #fff; padding: 8px 20px; border-radius: 30px; text-decoration: none; font-size: 0.9rem; }

        /* 主视觉 */
        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { font-size: 5rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .hero-subtitle { font-size: 1.5rem; color: var(--muted); margin: 20px 0 40px; font-weight: 300; }
        .btn-main { background: #18181b; color: #fff; padding: 14px 40px; border-radius: 12px; text-decoration: none; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        /* 页脚 */
        .footer { max-width: 1000px; margin: 40px auto; padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); }
        .footer a { text-decoration: none; color: var(--muted); margin-left: 15px; }
    </style>
</head>
<body>
    <div class="bg-grid"></div><div class="bg-glow"></div>
    <header class="navbar">
        <div class="logo">AnPin AI</div>
        <nav class="nav-center">
            <a href="index.html">首页</a>
            <a href="tutorial.html">教程</a>
            <a href="pricing.html">模型广场</a>
        </nav>
        <a href="/login" class="btn-console">控制台 ↗</a>
    </header>
    <main class="hero">
        <h1 class="hero-title">AnPin AI</h1>
        <div class="hero-subtitle"><span id="typewriter"></span><span style="color:var(--accent)">|</span></div>
        <a href="/login" class="btn-main">立即开始 &rarr;</a>
    </main>
    <footer class="footer">
        <div>© 2026 AnPin AI.</div>
        <div>
            <a href="docs.html">文档</a>
            <a href="terms.html">服务条款</a>
            <a href="privacy.html">隐私政策</a>
        </div>
    </footer>
    <script>
        const words = ["代码洪流，无畏挑战", "聚合模型，一站接入"];
        let i = 0, j = 0, isDel = false;
        function type() {
            const cur = words[i];
            document.getElementById("typewriter").textContent = cur.substring(0, isDel ? j-- : j++);
            if (!isDel && j > cur.length) { isDel = true; setTimeout(type, 2000); }
            else if (isDel && j === 0) { isDel = false; i = (i + 1) % words.length; setTimeout(type, 500); }
            else setTimeout(type, isDel ? 50 : 150);
        }
        type();
    </script>
</body>
</html>
