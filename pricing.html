<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型广场 - AnPin AI</title>
    <style>
        :root{--bg:#fafafa;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--accent:#8b5cf6;--card:#fff;--nav-bg:rgba(255,255,255,.82)}
        *{margin:0;padding:0;box-sizing:border-box}a{text-decoration:none;color:inherit}
        body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text)}
        .page{min-height:100vh;display:flex;flex-direction:column}

        .nav{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;position:relative;z-index:10}
        .nav-logo{font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:10px;letter-spacing:-.5px}
        .logo-box{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1e293b,#0f172a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
        .nav-links{display:flex;gap:22px;align-items:center;background:var(--nav-bg);backdrop-filter:blur(12px);padding:8px 28px;border-radius:40px;border:1px solid rgba(0,0,0,.05);box-shadow:0 4px 20px rgba(0,0,0,.02);font-size:.88rem;font-weight:500}
        .nav-links a{color:var(--text);transition:color .2s;display:flex;align-items:center;gap:6px}
        .nav-links a:hover,.nav-links a.active{color:var(--accent)}
        .btn-console{background:#1f2937;color:#fff;padding:8px 20px;border-radius:30px;font-size:.88rem;font-weight:600;transition:all .3s}
        .btn-console:hover{background:#000;transform:translateY(-1px)}

        .container{max-width:1200px;margin:0 auto;padding:0 24px;flex:1}

        .page-header{text-align:center;padding:50px 0 30px}
        .page-header h1{font-size:2.4rem;font-weight:800;letter-spacing:-1px;margin-bottom:10px}
        .page-header p{color:var(--muted);font-size:1rem;max-width:600px;margin:0 auto}

        .filters{display:flex;gap:10px;justify-content:center;margin-bottom:36px;flex-wrap:wrap}
        .filter-btn{background:var(--card);border:1px solid var(--border);padding:8px 20px;border-radius:30px;font-size:.85rem;cursor:pointer;transition:all .2s;font-weight:500;color:var(--muted)}
        .filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

        .search-bar{max-width:480px;margin:0 auto 32px;position:relative}
        .search-bar input{width:100%;padding:12px 20px 12px 44px;border:1px solid var(--border);border-radius:12px;font-size:.92rem;background:var(--card);outline:none;transition:border .2s}
        .search-bar input:focus{border-color:var(--accent)}
        .search-bar .icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem}

        .model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding-bottom:60px}
        .model-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all .3s}
        .model-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.06)}
        .model-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .model-name{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px}
        .platform-tag{font-size:.7rem;padding:3px 10px;border-radius:20px;font-weight:600}
        .tag-anthropic{background:#fff7ed;color:#ea580c}
        .tag-openai{background:#f0fdf4;color:#16a34a}
        .tag-gemini{background:#eff6ff;color:#2563eb}
        .tag-deepseek{background:#f5f3ff;color:#7c3aed}
        .model-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
        .model-tag{font-size:.72rem;padding:2px 10px;border-radius:12px;background:#f3f4f6;color:var(--muted);font-weight:500}
        .price-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .price-item{background:#f9fafb;border-radius:10px;padding:10px 12px;text-align:center}
        .price-label{font-size:.7rem;color:var(--muted);margin-bottom:4px}
        .price-value{font-size:1rem;font-weight:700;color:var(--text)}
        .price-unit{font-size:.68rem;color:var(--muted);font-weight:400}

        .footer-wrap{border-top:1px solid var(--border);padding:20px 0;margin-top:auto}
        .footer{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;font-size:.8rem;color:#9ca3af;flex-wrap:wrap;gap:10px}
        .footer-links{display:flex;gap:20px}
        .footer-links a:hover{color:var(--accent)}

        @media(max-width:768px){
            .nav{padding:14px 16px;flex-wrap:wrap;gap:10px}
            .nav-links{display:none}
            .model-grid{grid-template-columns:1fr}
            .page-header h1{font-size:1.8rem}
            .footer{flex-direction:column;align-items:center;text-align:center}
        }
    </style>
</head>
<body>
<div class="page">
    <header class="nav">
        <a href="/home" class="nav-logo"><div class="logo-box">AP</div> AnPin AI</a>
        <nav class="nav-links">
            <a href="/home">首页</a>
            <a href="/pricing" class="active">模型广场</a>
            <a href="/tutorial">教程</a>
            <a href="/docs">文档</a>
        </nav>
        <a href="/login" class="btn-console">控制台 ↗</a>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>模型广场</h1>
            <p>一站式接入全球领先 AI 大模型，按量计费，透明定价</p>
        </div>

        <div class="search-bar">
            <span class="icon">🔍</span>
            <input type="text" id="search" placeholder="搜索模型名称..." oninput="filterModels()">
        </div>

        <div class="filters" id="filters">
            <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
            <button class="filter-btn" onclick="setFilter('anthropic',this)">Anthropic</button>
            <button class="filter-btn" onclick="setFilter('openai',this)">OpenAI</button>
            <button class="filter-btn" onclick="setFilter('gemini',this)">Gemini</button>
            <button class="filter-btn" onclick="setFilter('deepseek',this)">DeepSeek</button>
        </div>

        <div class="model-grid" id="grid"></div>
    </div>

    <div class="footer-wrap">
        <footer class="footer">
            <div>&copy; 2026 AnPin AI. 保留所有权利.</div>
            <div class="footer-links">
                <a href="/docs">文档</a>
                <a href="/terms">服务条款</a>
                <a href="/privacy">隐私政策</a>
                <a href="/aup">使用政策</a>
            </div>
        </footer>
    </div>
</div>

<script>
const models=[
    {name:"claude sonnet 4.6",platform:"anthropic",tags:["推理","代码","视觉"],input:3,output:15,cache_write:3.75,cache_read:0.3},
    {name:"claude opus 4.6",platform:"anthropic",tags:["旗舰","推理","代码"],input:15,output:75,cache_write:18.75,cache_read:1.5},
    {name:"claude haiku 4.5",platform:"anthropic",tags:["快速","轻量"],input:0.8,output:4,cache_write:1,cache_read:0.08},
    {name:"gpt-5.4",platform:"openai",tags:["多模态","推理"],input:2.5,output:10,cache_write:null,cache_read:null},
    {name:"gpt-5.3",platform:"openai",tags:["快速","经济"],input:0.15,output:0.6,cache_write:null,cache_read:null},
];

let currentFilter='all';

function tagClass(p){return'tag-'+p}
function priceStr(v){return v==null?'—':'$'+v.toFixed(2)}

function renderCard(m){
    const cacheCols=m.cache_write!=null?`
        <div class="price-item"><div class="price-label">缓存写入</div><div class="price-value">${priceStr(m.cache_write)} <span class="price-unit">/MTok</span></div></div>
        <div class="price-item"><div class="price-label">缓存读取</div><div class="price-value">${priceStr(m.cache_read)} <span class="price-unit">/MTok</span></div></div>`:'';
    return`<div class="model-card" data-platform="${m.platform}" data-name="${m.name}">
        <div class="model-head">
            <span class="model-name">${m.name}</span>
            <span class="platform-tag ${tagClass(m.platform)}">${m.platform}</span>
        </div>
        <div class="model-tags">${m.tags.map(t=>'<span class="model-tag">'+t+'</span>').join('')}</div>
        <div class="price-grid">
            <div class="price-item"><div class="price-label">输入价格</div><div class="price-value">${priceStr(m.input)} <span class="price-unit">/MTok</span></div></div>
            <div class="price-item"><div class="price-label">输出价格</div><div class="price-value">${priceStr(m.output)} <span class="price-unit">/MTok</span></div></div>
            ${cacheCols}
        </div>
    </div>`;
}

function filterModels(){
    const q=document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.model-card').forEach(c=>{
        const p=c.dataset.platform;
        const n=c.dataset.name;
        const matchP=currentFilter==='all'||p===currentFilter;
        const matchQ=!q||n.includes(q);
        c.style.display=matchP&&matchQ?'':'none';
    });
}

function setFilter(f,btn){
    currentFilter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filterModels();
}

document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('grid').innerHTML=models.map(renderCard).join('');
});
</script>
</body>
</html>
